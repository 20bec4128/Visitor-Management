spring.application.name=visitor-management

# Load optional .env file (KEY=VALUE) from the process working directory.
# This lets PM2/systemd deployments configure the app without rebuilding the JAR.
spring.config.import=optional:file:.env[.properties]

# When running behind Apache/Nginx reverse proxy (HTTPS terminates at proxy),
# honor X-Forwarded-* so same-origin requests aren't misclassified as CORS.
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:framework}

server.port=${SERVER_PORT:8081}

# Helpful error output for local development (makes frontend show the real cause).
server.error.include-message=always

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/VisitorManagement}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:4658}}

# JPA
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${HIBERNATE_SHOW_SQL:true}

# File Upload (for images)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
# Directory where uploaded images are stored and served from (/uploads/**)
app.uploads.dir=${APP_UPLOADS_DIR:uploads}

# Frontend URL (for CORS)
app.frontend.url=${FRONTEND_URL:https://vms.infitoolz.com}

# Signed auth token secret used by the custom RBAC interceptor.
app.auth.secret=${AUTH_SECRET:visitor-management-dev-secret}

# WebRTC ICE servers for voice/video calls (returned by GET /api/calls/ice-servers).
# STUN is enough for same-network calls; set your own TURN server for calls across NATs/firewalls.
webrtc.stun.urls=${WEBRTC_STUN_URLS:stun:stun.l.google.com:19302}
webrtc.turn.url=${WEBRTC_TURN_URL:}
webrtc.turn.username=${WEBRTC_TURN_USERNAME:}
webrtc.turn.credential=${WEBRTC_TURN_CREDENTIAL:}

# Bootstrap admin login details.
app.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:Admin@123}

# SMTP (configure via .env: SMTP_HOST / SMTP_PORT / SMTP_USERNAME / SMTP_PASSWORD / ...)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
# Trust the configured SMTP host's cert (works around TLS-inspection proxies).
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST:}
app.mail.from=${MAIL_FROM:no-reply@yourdomain.com}

# Face recognition service
# Use 127.0.0.1 to avoid IPv6 localhost (::1) resolution issues on some machines.
face.service.url=${FACE_SERVICE_URL:http://127.0.0.1:8000}
face.match.threshold=${FACE_MATCH_THRESHOLD:0.5}
