server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow visitor/profile image uploads up to the backend's 20MB limit.
    client_max_body_size 25m;

    # API calls go to the backend container — same origin, so no CORS needed.
    location /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded media (served by the backend outside /api).
    location /uploads/ {
        proxy_pass http://backend:8081;
    }

    # SPA client-side routing: fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
